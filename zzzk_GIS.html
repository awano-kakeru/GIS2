<html>
<head>
    <meta charset="UTF-8" />
    <title>My Page</title>

    <style>
        /* ページ全体 */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

            /* 背景グラデーション */
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);

            color: white;
            text-align: center;

            overflow-x: hidden;
        }

        /* 背景の丸 */
        .circle {
            position: fixed;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            animation: float 10s infinite ease-in-out;
        }

        .c1 {
            width: 200px;
            height: 200px;
            top: 50px;
            left: -50px;
        }

        .c2 {
            width: 300px;
            height: 300px;
            bottom: -100px;
            right: -50px;
            animation-duration: 15s;
        }

        .c3 {
            width: 150px;
            height: 150px;
            top: 300px;
            right: 100px;
            animation-duration: 7s;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
            100% {
                transform: translateY(0px);
            }
        }

        /* メインカード */
        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);

            width: 80%;
            max-width: 700px;

            margin: 50px auto;
            padding: 30px;

            border-radius: 25px;

            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        h2 {
            margin-top: 40px;
            font-size: 30px;
        }

        /* 画像 */
        img {
            width: 250px;
            border-radius: 20px;

            border: 5px solid white;

            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.05) rotate(2deg);
        }

        /* 文章 */
        p {
            font-size: 20px;
            line-height: 1.8;
        }

        /* リンク */
        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 20px 0;
        }

        a {
            color: yellow;
            font-size: 22px;
            text-decoration: none;
            font-weight: bold;

            transition: 0.3s;
        }

        a:hover {
            color: white;
            letter-spacing: 2px;
        }

        /* タイトルを光らせる */
        .glow {
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px white;
            }

            to {
                text-shadow:
                    0 0 20px white,
                    0 0 30px cyan;
            }
        }
    </style>
</head>

<body>

    <!-- 背景の丸 -->
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>

    <div class="card">

        <h1 class="glow">Kakeru Awano</h1>

        <img src="ore.jpg" />

        <p>
            Hello! I’m Kakeru Awano.<br>
            My strength is bringing together ideas in a group.<br>
            In this class, I would like to create a map related to disaster prevention.
        </p>

        <h2>🌍 My Favorite Websites / Maps</h2>

        <ul>
            <li>
                気になるWebマップ：
                <a href="https://geojson.io/next/" target="_blank">
                    GeoJSON.io
                </a>
            </li>

            <li>
                好きなWebサイト：
                <a href="https://thetruesize.com/#?borders=1~!MTc2MDk4ODM.NjM*MzYwMDAwMDA(MA~!JP*MTU3Nzk3NTk.MjkzNDY0Ng)NA~!GL*NDAzMjM3Nw.MTcwMDc4OQNQ"
                    target="_blank">
                    The True Size Of
                </a>
            </li>
        </ul>

    </div>

</body>
</html>
